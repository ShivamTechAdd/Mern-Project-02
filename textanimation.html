<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee+Spice&family=Lato&family=Noto+Sans:wght@300&family=Poppins:wght@300&family=Roboto:ital,wght@1,500&display=swap" rel="stylesheet">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family:'Lucida Sans', 'Lucida Sans Regular';
            font-family: 'Bungee Spice', sans-serif;
        }
        body{
            background-color: #000000;
            height: 100vh;
            display: grid;
            place-items: center;
        }
        h1{
            font-size: 200px;
            font-weight: 800;
            color: lightgoldenrodyellow;
            text-align: center;
            text-transform: capitalize;
            text-shadow: -3px 10px 10px yellowgreen;
            animation: text 2s linear  alternate-reverse infinite ;
        }
        @keyframes text{
            0%{
                rotate: 15deg;
            }
            50%{
                rotate: 0deg;
            }
            100%{
                rotate: -15deg;
            }
        }

    </style>
</head>
<body>
    <h1>Adarsh<br> ojha</h1>
</body>
</html>
