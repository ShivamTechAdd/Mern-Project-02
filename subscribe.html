<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family:'Lucida Sans', 'Lucida Sans Regular';
            font-family: 'Bungee Spice', sans-serif;
        }
        body{
            background-color: #000000;
            height: 100vh;
            display: grid;
            place-items: center;
         
        }
        h1{
            text-align: center;
            color: wheat;
            font-weight: bold;
            font-size: 99px;
            text-shadow: -1px 2px 3px gray;
            position: relative;
        }
        h1::before{
            position:absolute;
            content: "SUBSCRIBE...";
            top: 0;
            left: 0;
            width: 80%;
            color: red;
            text-transform: uppercase;
            border-right: 2px solid yellow;
            overflow: hidden;
            animation: subs 3s linear infinite;
        }
        @keyframes subs{
            0%{
                width: 0%;
            }
            50%{
                width: 100%;
            }
            100%{
                width: 0%;
            }
        }
                </style>
</head>
<body>
    <h1>SUBSCRIBE</h1>
</body>
</html>
