<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family:'Lucida Sans', 'Lucida Sans Regular';
        }
        body{
            background-color: #000000;
            height: 100vh;
            display: grid;
            place-items: center;
        }
        button{
            padding: 12px 36px;
            border: 2px solid #865dff;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #865dff;
            text-transform: capitalize;
            background-color: transparent;

            &:hover{
                color: #d80032;
                border: 2px solid red;
                animation: shaking 2s linear;
            }
        }
        @keyframes shaking{
             0%{
                rotate:20deg;
             }   
            50%{
                rotate:-20deg;
            }
            100%{
                rotate:20deg;
            }
        }

    </style>
</head>
<body>
    <button type="submit">shake me</button>
</body>
</html>
