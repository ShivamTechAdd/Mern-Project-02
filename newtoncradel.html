<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display: grid;
            height: 100vh;
            place-items: center;
            background-color: antiquewhite;
        }
        html{
            font-size: 62.5%;
        }

        .cradel{
            width: 50rem;
            height: 50rem;
            background-color: transparent;
            border-top: 2rem solid blue;
            border-radius: 0.5rem;
            display: flex;
            justify-content: center;
            gap:5rem;
            position: relative;
        }
        div{
            width: .5rem;
            height: 20rem;
            background-color: blue;
        }
      .cradel div::before{
            content: "";
            position: absolute;
            top: 195px;
            width: 5rem;
            aspect-ratio: 1;
            border-radius: 50%;
            background-color: blue;
        }
        .cradel div:first-child{
            animation: left-swing 2s linear infinite alternate;
        }
        @keyframes left-swing{
            0%{
                rotate: 0deg;
                transform-origin: top-left;
            }
            100%{
                rotate: 30deg;
                transform-origin: top-left;
            }
        }

    </style>
</head>
<body>
    <div class="cradel">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
</body>
</html>
